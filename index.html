<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brawl Stars – Claim a Reward</title>
  <meta name="description" content="Claim a Reward in Brawl Stars! Open the link or download the game." />
  <meta property="og:title" content="Brawl Stars" />
  <meta property="og:description" content="Open link in Brawl Stars or download the game." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="main-container" class="main">
    <div class="contents">
      <!-- Logo -->
      <a id="game-home-page" href="https://appchecker.space/cl/i/grjqo3">
        <img
          alt="logo"
          loading="lazy"
          width="350"
          height="200"
          decoding="async"
          class="logo"
          style="color: transparent"
          src="https://link.brawlstars.com/images/game/logo.svg"
        />
      </a>

      <div class="nested-content">
        <!-- Subtitle -->
        <div class="lead-wrapper" id="page-title">
          <p>Claim a Reward in Brawl&nbsp;Stars!</p>
        </div>

        <!-- Claim Reward Button -->
        <a
          id="open-game-button"
          class="button"
          href="https://appchecker.space/cl/i/grjqo3"
          data-testid="open-game-button"
        >
          <span>Claim Reward</span>
        </a>

        <!-- Download Section -->
        <div class="download-links-wrapper">
          <div class="download-links-heading" id="download-heading">
            Download Brawl&nbsp;Stars
          </div>

          <div class="download-links" data-links-amount="2" id="store-badges">
            <a
              href="https://appchecker.space/cl/i/grjqo3"
              id="android-download-link"
            >
              <img
                alt="android"
                loading="lazy"
                width="200"
                height="60"
                decoding="async"
                src="https://link.brawlstars.com/images/common/store-logos/en/nextImageExportOptimizer/google-play-opt-640.WEBP"
                style="color: transparent"
              />
            </a>
            <a
              href="https://appchecker.space/cl/i/grjqo3"
              id="ios-download-link"
            >
              <img
                alt="ios"
                loading="lazy"
                width="200"
                height="60"
                decoding="async"
                src="https://link.brawlstars.com/images/common/store-logos/en/app-store.svg"
                style="color: transparent"
              />
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
